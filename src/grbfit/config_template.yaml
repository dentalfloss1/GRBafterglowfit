burst:
  name: test_grb
  t0: 1.0

data:
  radio_file: grbmeas.csv
  other_file: otherdata.txt
  batxrt_file: batxrt.txt

model:
  type: forward_reverse   # or forward_only
  k: 2
  p: 2.2

fit:
  initial_guess:
    f0: 1e-3
    f0_rev: 5e-5
    nua0_rev: 10
    nua_0: 13
    num_0: 100
    nuc_0: 8e8

  bounds:
    f0: [1e-6, 1]
    f0_rev: [3e-5, 1e5]
    nua0_rev: [0.1, 1e6]
    nua_0: [6, 15]
    num_0: [33, 1e4]
    nuc_0: [1e8, 2e9]
